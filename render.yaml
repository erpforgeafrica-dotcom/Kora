databases:
  - name: kora-postgres
    databaseName: kora
    user: kora
    plan: free

services:
  - type: redis
    name: kora-redis
    plan: free
    ipAllowList: []

  - type: web
    name: kora-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_DEMO_MODE
        value: false
      - key: ENABLE_MOCK_PAYMENTS
        value: false
      - key: DB_POOL_MAX
        value: 20
      - key: DB_POOL_MIN
        value: 5
      - key: DB_IDLE_TIMEOUT
        value: 30000
      - key: DB_CONNECTION_TIMEOUT
        value: 5000
      - key: DB_STATEMENT_TIMEOUT
        value: 30000
      - key: DB_QUERY_TIMEOUT
        value: 30000
      - key: DATABASE_URL
        fromDatabase:
          name: kora-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kora-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: worker
    name: kora-worker
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_DEMO_MODE
        value: false
      - key: ENABLE_MOCK_PAYMENTS
        value: false
      - key: DB_POOL_MAX
        value: 20
      - key: DB_POOL_MIN
        value: 5
      - key: DB_IDLE_TIMEOUT
        value: 30000
      - key: DB_CONNECTION_TIMEOUT
        value: 5000
      - key: DB_STATEMENT_TIMEOUT
        value: 30000
      - key: DB_QUERY_TIMEOUT
        value: 30000
      - key: DATABASE_URL
        fromDatabase:
          name: kora-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kora-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: kora-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ORG_ID
        sync: false
