services:
  # ── Redis (Render managed) ────────────────────────────────────────────────────
  - type: redis
    name: kora-redis
    plan: free
    ipAllowList: []

  # ── Backend API ───────────────────────────────────────────────────────────────
  - type: web
    name: kora-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_DEMO_MODE
        value: false
      - key: ENABLE_MOCK_PAYMENTS
        value: false
      - key: DB_POOL_MAX
        value: 10
      - key: DB_POOL_MIN
        value: 2
      - key: DB_IDLE_TIMEOUT
        value: 30000
      - key: DB_CONNECTION_TIMEOUT
        value: 5000
      - key: DB_STATEMENT_TIMEOUT
        value: 30000
      - key: DB_QUERY_TIMEOUT
        value: 30000
      # ── Secrets (set in Render dashboard → Environment) ──────────────────────
      # Database URL - required
      - key: DATABASE_URL
        sync: false
      # Redis - auto-linked from service
      - key: REDIS_URL
        fromService:
          type: redis
          name: kora-redis
          property: connectionString
      # Auth secrets - required
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      # Payment secrets
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Monitoring
      - key: SENTRY_DSN
        sync: false
      # CORS & API base URL
      - key: CORS_ORIGINS
        sync: false
      - key: API_BASE_URL
        sync: false
      # AI providers - at least one required
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: AI_BUDGET_USD_MONTHLY
        value: 100

  # ── Background Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: kora-worker
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: kora-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # ── Frontend (static site) ────────────────────────────────────────────────────
  - type: web
    name: kora-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
