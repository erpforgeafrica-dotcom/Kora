version: "3.9"

# Staging Environment
# Usage: docker-compose -f docker-compose.staging.yml up -d

services:
  # PostgreSQL Database - Staging
  postgres-staging:
    image: postgres:16-alpine
    container_name: kora-postgres-staging
    environment:
      POSTGRES_DB: kora_staging
      POSTGRES_USER: kora_staging
      POSTGRES_PASSWORD: staging_secure_password_change_me
      POSTGRES_INITDB_ARGS: |
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c maintenance_work_mem=256MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=5242kB
        -c min_wal_size=8GB
        -c max_wal_size=32GB
        -c max_worker_processes=4
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=4
    volumes:
      - pg_data_staging:/var/lib/postgresql/data
      - ./scripts/init-staging.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kora_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kora-staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Staging
  redis-staging:
    image: redis:7-alpine
    container_name: kora-redis-staging
    command: redis-server --appendonly yes --requirepass staging_redis_password_change_me
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kora-staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend Server - Staging
  backend-staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kora-backend-staging
    env_file:
      - ./backend/.env.staging
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://kora_staging:staging_secure_password_change_me@postgres-staging:5432/kora_staging
      REDIS_URL: redis://:staging_redis_password_change_me@redis-staging:6379
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    networks:
      - kora-staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # Expose only internally, use reverse proxy (nginx) for external access

  # Worker Service - Staging
  worker-staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kora-worker-staging
    command: node dist/workers.js
    env_file:
      - ./backend/.env.staging
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://kora_staging:staging_secure_password_change_me@postgres-staging:5432/kora_staging
      REDIS_URL: redis://:staging_redis_password_change_me@redis-staging:6379
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    networks:
      - kora-staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Frontend - Staging
  frontend-staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: staging
    container_name: kora-frontend-staging
    env_file:
      - ./frontend/.env.staging
    environment:
      NODE_ENV: staging
    depends_on:
      - backend-staging
    networks:
      - kora-staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data_staging:
    driver: local
  redis_data_staging:
    driver: local

networks:
  kora-staging-network:
    driver: bridge
