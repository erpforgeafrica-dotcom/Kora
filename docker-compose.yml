version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: kora-postgres
    environment:
      POSTGRES_USER: kora
      POSTGRES_PASSWORD: kora_dev_password
      POSTGRES_DB: kora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kora-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kora-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: kora-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kora:kora_dev_password@postgres:5432/kora
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kora-network
    restart: unless-stopped
    command: npm run dev
    # Added healthcheck inside compose to make frontend depend on it securely (fallback if internal not ready)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: kora-worker
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kora:kora_dev_password@postgres:5432/kora
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kora-network
    restart: unless-stopped
    command: npm run dev:worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: kora-frontend
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
         condition: service_healthy
    networks:
      - kora-network
    restart: unless-stopped
    command: npm run dev -- --host

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kora-network:
    driver: bridge
