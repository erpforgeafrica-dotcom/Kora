name: Security Threat Detection Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/src/**'
      - 'backend/package.json'
      - '.github/workflows/threat-detection-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/src/**'
      - 'backend/package.json'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/threat-detection

jobs:
  test-threat-detection:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kora
          POSTGRES_PASSWORD: kora_test
          POSTGRES_DB: kora_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: backend
        run: npm run typecheck

      - name: Run threat detection tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://kora:kora_test@localhost:5432/kora_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test_secret
        run: npm run test -- src/test/threatDetection.test.ts

      - name: Run all backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://kora:kora_test@localhost:5432/kora_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test_secret
        run: npm test

      - name: Generate coverage report
        working-directory: backend
        env:
          DATABASE_URL: postgresql://kora:kora_test@localhost:5432/kora_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test_secret
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: threat-detection
          name: threat-detection-coverage

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: threat-detection-test-results
          path: backend/coverage/

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run npm audit for high vulnerabilities
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Run SNYK security scan
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --fail-on=all
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run ESLint
        working-directory: backend
        run: npm run lint 2>/dev/null || true

  build-threat-detection-image:
    runs-on: ubuntu-latest
    needs: [test-threat-detection, security-audit]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-threat-detection:
    runs-on: ubuntu-latest
    needs: build-threat-detection-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to staging
        run: |
          echo "Deploying threat detection to staging..."
          # kubectl apply -f kubernetes/threat-detection-deployment.yaml --context=staging
          # kubectl set image deployment/threat-detection-engine \
          #   threat-detection=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #   --context=staging \
          #   -n threat-detection
          echo "Deployment would proceed here"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          sleep 5
          curl -f http://staging-threat-detection/health || exit 1
          echo "✓ Health check passed"

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Threat Detection deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
