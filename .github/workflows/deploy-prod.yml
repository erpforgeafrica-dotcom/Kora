name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        default: 'latest'
      require_approval:
        description: 'Require manual approval'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-deployment-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify image exists
        run: |
          echo "🔍 Verifying image tags..."
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.inputs.image_tag }} > /dev/null; then
            echo "✅ Backend image found"
          else
            echo "❌ Backend image not found: ${{ github.inputs.image_tag }}"
            exit 1
          fi

      - name: NotifySlack - Deployment Initiated
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: `🚀 Production deployment initiated by ${process.env.AS_USER}`,
              attachments: [{
                color: 'good',
                fields: [
                  {title: 'Image Tag', value: '${{ github.inputs.image_tag }}', short: true},
                  {title: 'Repository', value: process.env.AS_REPO, short: true}
                ]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: github.inputs.require_approval == 'true'

    steps:
      - name: ⏸️ Waiting for approval...
        run: echo "🔐 Deployment is waiting for manual approval in GitHub Environment"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, approval]
    if: always() && needs.pre-deployment-checks.result == 'success'
    environment:
      name: production
      url: https://api.kora.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deployment record
        uses: actions/github-script@v6
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Production deployment via GitHub Actions',
              auto_merge: false,
              required_contexts: []
            });
            console.log('Deployment created:', deployment.data.id);
            core.exportVariable('DEPLOYMENT_ID', deployment.data.id);

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: us-east-1

      - name: Pre-deployment backup
        run: |
          echo "💾 Creating database backup..."
          BACKUP_ID=$(date +%Y%m%d-%H%M%S)
          aws rds create-db-snapshot \
            --db-instance-identifier kora-prod \
            --db-snapshot-identifier kora-prod-pre-deploy-${BACKUP_ID} \
            --region us-east-1
          echo "✅ Backup created: kora-prod-pre-deploy-${BACKUP_ID}"

      - name: SSH Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          timeout: 600s
          command_timeout: 10m
          script: |
            set -e
            
            echo "📦 Pulling latest code..."
            cd ~/kora
            git fetch origin main
            git checkout origin/main
            
            echo "🔐 Logging in to registry..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📥 Pulling images..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.inputs.image_tag }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.inputs.image_tag }}
            
            echo "🗄️ Backing up current configuration..."
            cp -r ~/kora ~/kora.backup.$(date +%Y%m%d-%H%M%S)
            
            echo "🔄 Rolling update (blue-green deployment)..."
            # Update backend-prod-2 first
            docker-compose -f docker-compose.prod.yml up -d backend-prod-2
            sleep 10
            
            # Wait for health check
            for i in {1..30}; do
              if docker exec kora-backend-prod-2 curl -f http://localhost:3000/health > /dev/null 2>&1; then
                echo "✅ backend-prod-2 is healthy"
                break
              fi
              echo "⏳ Waiting for backend-prod-2 to be healthy ($i/30)..."
              sleep 2
            done
            
            # Update backend-prod
            docker-compose -f docker-compose.prod.yml up -d backend-prod
            sleep 10
            
            # Update frontend
            docker-compose -f docker-compose.prod.yml up -d frontend-prod
            
            echo "⏳ Waiting for all services to be healthy..."
            sleep 20
            
            echo "🗄️ Running migrations..."
            docker exec kora-backend-prod npm run db:migrate
            
            echo "✅ Deployment complete!"
            docker-compose -f docker-compose.prod.yml ps

      - name: Health verification
        run: |
          echo "🏥 Performing health checks..."
          
          # Check backend
          echo "Checking backend health..."
          for i in {1..30}; do
            if curl -f https://api.kora.app/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
              break
            fi
            echo "⏳ Retry $i/30..."
            sleep 2
          done
          
          # Check frontend
          echo "Checking frontend health..."
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kora.app)
            if [ $STATUS -eq 200 ]; then
              echo "✅ Frontend is responding"
              break
            fi
            echo "⏳ Retry $i/15 (Status: $STATUS)..."
            sleep 2
          done

      - name: Smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          curl -f https://api.kora.app/api/businesses || exit 1
          echo "✅ API endpoints responding"

      - name: Mark deployment as success
        uses: actions/github-script@v6
        if: success()
        with:
          script: |
            const deployment_id = process.env.DEPLOYMENT_ID;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment_id,
              state: 'success',
              description: 'Production deployment successful'
            });

      - name: Mark deployment as failure
        uses: actions/github-script@v6
        if: failure()
        with:
          script: |
            const deployment_id = process.env.DEPLOYMENT_ID;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment_id,
              state: 'failure',
              description: 'Production deployment failed'
            });

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: `✅ Production deployment successful!`,
              attachments: [{
                color: 'good',
                fields: [
                  {title: 'Image Tag', value: '${{ github.inputs.image_tag }}', short: true},
                  {title: 'Deployed By', value: process.env.AS_USER, short: true},
                  {title: 'Repository', value: process.env.AS_REPO, short: false}
                ]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: `❌ Production deployment failed!`,
              attachments: [{
                color: 'danger',
                fields: [
                  {title: 'Image Tag', value: '${{ github.inputs.image_tag }}', short: true},
                  {title: 'Repository', value: process.env.AS_REPO, short: false},
                  {title: 'Action', value: `<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>`, short: false}
                ]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
