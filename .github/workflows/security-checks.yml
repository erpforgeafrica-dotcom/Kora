name: Security Checks & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security checks daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (backend)
        working-directory: backend
        run: npm ci

      - name: Install dependencies (frontend)
        working-directory: frontend
        run: npm ci

      - name: Run SonarQube analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Check backend dependencies
        working-directory: backend
        run: npm audit --audit-level=moderate

      - name: Check frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: License compliance check
        uses: licensefinder/license_finder_action@v2
        with:
          working_directory: backend

  sast-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ['javascript', 'typescript']

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/kora/threat-detection:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: gitguardian/ggshield-action@master
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  threat-detection-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kora
          POSTGRES_PASSWORD: kora_test
          POSTGRES_DB: kora_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify threat detection schema
        working-directory: backend
        env:
          DATABASE_URL: postgresql://kora:kora_test@localhost:5432/kora_test
          NODE_ENV: test
        run: |
          # Check if migration file exists
          if [ ! -f src/db/migrations/050_threat_detection.sql ]; then
            echo "❌ Migration file 050_threat_detection.sql not found"
            exit 1
          fi
          echo "✓ Migration file found"
          
          # Verify TypeScript compilation
          npm run typecheck
          echo "✓ TypeScript compilation successful"
          
          # Verify threat engine exists
          if [ ! -f src/services/threatDetection/threatEngine.ts ]; then
            echo "❌ Threat engine not found"
            exit 1
          fi
          echo "✓ Threat engine verified"

      - name: Verify API endpoints
        working-directory: backend
        run: |
          # Check for required endpoints
          grep -r "GET.*security/dashboard" src/ || { echo "❌ Dashboard endpoints not found"; exit 1; }
          echo "✓ Dashboard endpoints found"

      - name: Verify detector implementations
        working-directory: backend
        run: |
          # Check for all 8 detectors
          DETECTORS=(
            "detectSQLInjection"
            "detectCrossOrgAccess"
            "detectBruteForce"
            "detectImpossibleTravel"
            "detectDataExfiltration"
            "detectPrivilegeEscalation"
            "detectTokenAnomaly"
            "detectRateLimit"
          )
          
          for detector in "${DETECTORS[@]}"; do
            grep -r "$detector" src/services/threatDetection/ || {
              echo "❌ Detector $detector not found"
              exit 1
            }
          done
          echo "✓ All 8 detectors verified"

  kubernetes-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate Kubernetes manifests
        run: |
          # Check if kubectl is available
          kubectl version || true
          
          # Validate YAML syntax
          for file in kubernetes/*.yaml; do
            echo "Validating $file..."
            kubectl apply --dry-run=client -f "$file" || exit 1
          done
          echo "✓ All Kubernetes manifests are valid"

      - name: Validate Helm charts
        run: |
          # Check if helm is available
          helm version || true
          
          # Validate any Helm charts
          if [ -d "helm/threat-detection" ]; then
            helm lint helm/threat-detection/
            echo "✓ Helm chart is valid"
          fi

  performance-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run performance tests
        working-directory: backend
        run: npm run test:perf 2>/dev/null || echo "Performance tests not configured"

      - name: Check bundle size
        working-directory: backend
        run: |
          npm run build 2>/dev/null || true
          # Check if dist is small enough
          if [ -d "dist" ]; then
            SIZE=$(du -sh dist | cut -f1)
            echo "Build size: $SIZE"
          fi

  report-status:
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-check, sast-analysis, container-scan, threat-detection-verify]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "SAST Analysis: ${{ needs.sast-analysis.result }}"
          echo "Container Scan: ${{ needs.container-scan.result }}"
          echo "Threat Detection: ${{ needs.threat-detection-verify.result }}"
          
          if [ "${{ needs.code-quality.result }}" != "success" ] || \
             [ "${{ needs.sast-analysis.result }}" != "success" ] || \
             [ "${{ needs.threat-detection-verify.result }}" != "success" ]; then
            echo "❌ Security checks failed"
            exit 1
          fi
          echo "✓ All security checks passed"

      - name: Notify security team
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚨 Security checks failed'
          webhook_url: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
