<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>KORA Dashboard</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #0c0e14;
        color: #edf0ff;
        font-family: "Segoe UI", sans-serif;
      }

      #boot-fallback[hidden] {
        display: none;
      }

      #boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top right, rgba(0, 229, 200, 0.12) 0%, transparent 30%),
          radial-gradient(circle at bottom left, rgba(0, 229, 200, 0.08) 0%, transparent 24%),
          #0c0e14;
      }

      .boot-card {
        width: min(100%, 420px);
        padding: 32px;
        border-radius: 20px;
        background: #141720;
        border: 1px solid #1e2235;
        box-shadow: 0 22px 60px rgba(4, 8, 24, 0.38);
      }

      .boot-eyebrow {
        margin: 0 0 8px;
        color: #00e5c8;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-family: "Consolas", "Courier New", monospace;
      }

      .boot-title {
        margin: 0 0 10px;
        font-size: 24px;
      }

      .boot-copy {
        margin: 0 0 20px;
        color: #8b92b8;
        font-size: 14px;
        line-height: 1.6;
      }

      .boot-form {
        display: grid;
        gap: 12px;
      }

      .boot-actions {
        display: grid;
        gap: 12px;
      }

      .boot-input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #1e2235;
        background: #0f1119;
        color: #edf0ff;
        font-size: 14px;
      }

      .boot-button {
        border: none;
        border-radius: 10px;
        padding: 12px 14px;
        background: #00e5c8;
        color: #0c0e14;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .boot-meta {
        margin-top: 16px;
        color: #8b92b8;
        font-size: 12px;
      }

      .boot-error {
        min-height: 18px;
        color: #ff8b86;
        font-size: 12px;
      }

      .boot-success {
        color: #7ef0cb;
        font-size: 13px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" hidden>
      <div class="boot-card">
        <div class="boot-eyebrow">KORA Platform</div>
        <h1 class="boot-title">Sign in</h1>
        <p class="boot-copy">
          The app runtime is taking longer than expected. You can still sign in from this recovery screen.
        </p>
        <form id="boot-login-form" class="boot-form">
          <input id="boot-email" class="boot-input" type="email" placeholder="Email" autocomplete="username" required />
          <input id="boot-password" class="boot-input" type="password" placeholder="Password" autocomplete="current-password" required />
          <div id="boot-error" class="boot-error"></div>
          <button id="boot-submit" class="boot-button" type="submit">Sign in</button>
        </form>
        <div id="boot-session" class="boot-actions" hidden>
          <div id="boot-success" class="boot-success"></div>
          <button id="boot-continue" class="boot-button" type="button">Continue to workspace</button>
          <button id="boot-reset" class="boot-button" type="button" style="background:#1e2235;color:#edf0ff;">Sign out and try again</button>
        </div>
        <div class="boot-meta">Recovery route: <span id="boot-route"></span></div>
      </div>
    </div>
    <script>
      (function () {
        const API_BASE = "http://localhost:3000";
        const bootFallback = document.getElementById("boot-fallback");
        const bootRoute = document.getElementById("boot-route");
        const bootForm = document.getElementById("boot-login-form");
        const bootEmail = document.getElementById("boot-email");
        const bootPassword = document.getElementById("boot-password");
        const bootError = document.getElementById("boot-error");
        const bootSubmit = document.getElementById("boot-submit");
        const bootSession = document.getElementById("boot-session");
        const bootSuccess = document.getElementById("boot-success");
        const bootContinue = document.getElementById("boot-continue");
        const bootReset = document.getElementById("boot-reset");

        if (bootRoute) {
          bootRoute.textContent = window.location.pathname + window.location.search;
        }

        function normalizeRole(input) {
          if (!input) return null;
          const role = String(input).trim().toLowerCase();
          const aliases = {
            client: "client",
            customer: "client",
            staff: "staff",
            therapist: "staff",
            receptionist: "staff",
            business_admin: "business_admin",
            "business-admin": "business_admin",
            owner: "business_admin",
            manager: "business_admin",
            admin: "business_admin",
            operations: "operations",
            dispatcher: "dispatcher",
            support: "operations",
            "delivery-agent": "delivery_agent",
            delivery_agent: "delivery_agent",
            courier: "delivery_agent",
            rider: "delivery_agent",
            inventory_manager: "inventory_manager",
            "inventory-manager": "inventory_manager",
            sales_manager: "sales_manager",
            "sales-manager": "sales_manager",
            sales_agent: "sales_agent",
            "sales-agent": "sales_agent",
            platform_admin: "platform_admin",
            "platform-admin": "platform_admin",
            kora_admin: "platform_admin",
            "kora-admin": "platform_admin",
            kora_superadmin: "platform_admin"
          };

          return aliases[role] || null;
        }

        function getDefaultPath(role) {
          switch (role) {
            case "client":
              return "/app/client";
            case "staff":
              return "/app/staff";
            case "inventory_manager":
              return "/app/business-admin/inventory";
            case "sales_manager":
            case "sales_agent":
              return "/app/business-admin/leads";
            case "dispatcher":
            case "delivery_agent":
              return "/app/operations/delivery/bookings";
            case "business_admin":
              return "/app/business-admin";
            case "operations":
              return "/app/operations";
            case "platform_admin":
            default:
              return "/app/kora-admin/tenants";
          }
        }

        function showBootFallback() {
          if (window.__koraBootReady || !bootFallback) {
            return;
          }
          bootFallback.hidden = false;
        }

        function getStoredWorkspacePath() {
          const role = normalizeRole(localStorage.getItem("kora_user_role"));
          return getDefaultPath(role);
        }

        function showSignedInState() {
          if (!bootForm || !bootSession || !bootSuccess) {
            return;
          }

          const token = localStorage.getItem("kora_token");
          if (!token) {
            bootForm.hidden = false;
            bootSession.hidden = true;
            return;
          }

          const email = localStorage.getItem("kora_user_email") || "Authenticated user";
          const role = localStorage.getItem("kora_user_role") || "workspace user";
          bootSuccess.textContent = "Signed in successfully as " + email + " (" + role.replace(/_/g, " ") + ").";
          bootForm.hidden = true;
          bootSession.hidden = false;
        }

        function getErrorMessage(json) {
          if (!json || typeof json !== "object") {
            return "Unable to sign in.";
          }

          if (json.error && typeof json.error === "object" && json.error.message) {
            return String(json.error.message);
          }

          if (typeof json.error === "string") {
            return json.error;
          }

          if (typeof json.message === "string") {
            return json.message;
          }

          return "Unable to sign in.";
        }

        window.__koraShowBootFallback = showBootFallback;
        window.setTimeout(showBootFallback, 1800);

        if (!bootForm || !bootEmail || !bootPassword || !bootError || !bootSubmit || !bootContinue || !bootReset) {
          return;
        }

        showSignedInState();

        bootContinue.addEventListener("click", function () {
          const nextPath = getStoredWorkspacePath();
          window.location.replace(nextPath + (nextPath.includes("?") ? "&" : "?") + "fresh=" + Date.now());
        });

        bootReset.addEventListener("click", function () {
          localStorage.removeItem("kora_token");
          localStorage.removeItem("kora_org_id");
          localStorage.removeItem("kora_user_role");
          localStorage.removeItem("kora_user_email");
          bootError.textContent = "";
          bootForm.hidden = false;
          bootSession.hidden = true;
          bootPassword.value = "";
        });

        bootForm.addEventListener("submit", async function (event) {
          event.preventDefault();
          bootError.textContent = "";
          bootSubmit.disabled = true;
          bootSubmit.textContent = "Signing in...";

          try {
            const response = await fetch(API_BASE + "/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: bootEmail.value,
                password: bootPassword.value
              })
            });

            const json = await response.json();
            const payload = json && typeof json === "object" && json.data && typeof json.data === "object" ? json.data : json;
            const accessToken = payload && payload.accessToken;
            const user = (payload && payload.user) || null;
            const organizationId = user && user.organizationId ? user.organizationId : null;
            const role = normalizeRole(user && user.role);
            const email = user && user.email ? user.email : bootEmail.value;

            if (!response.ok || !accessToken) {
              bootError.textContent = getErrorMessage(json);
              return;
            }

            localStorage.setItem("kora_token", accessToken);
            if (organizationId) {
              localStorage.setItem("kora_org_id", organizationId);
            }
            if (role) {
              localStorage.setItem("kora_user_role", role);
            }
            if (email) {
              localStorage.setItem("kora_user_email", email);
            }

            showSignedInState();
            window.setTimeout(function () {
              window.location.replace(getDefaultPath(role) + "?fresh=" + Date.now());
            }, 200);
          } catch (error) {
            bootError.textContent = "Unable to reach the server.";
          } finally {
            bootSubmit.disabled = false;
            bootSubmit.textContent = "Sign in";
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx?v=20260324-runtime-reset"></script>
  </body>
</html>
